name: ClaudeDash

options:
  bundleIdPrefix: com.claudedash
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    VALID_ARCHS: "arm64 x86_64"

packages:
  Lottie:
    path: Vendor/lottie-spm

schemes:
  ClaudeDash:
    build:
      targets:
        ClaudeDash: all
        ClaudeDashHelper: [build]
        ClaudeDashTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: ClaudeDashTests

targets:

  ClaudeDash:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: ClaudeDash/Sources
      - path: ClaudeDash/Resources
        excludes:
          - Info.plist
    info:
      path: ClaudeDash/Resources/Info.plist
      properties:
        CFBundleName: Claude Glance
        CFBundleDisplayName: Claude Glance
        CFBundleIdentifier: com.claudedash.app
        CFBundleShortVersionString: "0.0.8"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSUserNotificationAlertStyle: alert
        NSDesktopFolderUsageDescription: "Claude Glance 需要访问桌面文件以监控 Claude Code 的 transcript 文件。"
        NSDocumentsFolderUsageDescription: "Claude Glance 需要访问文档以监控 Claude Code 的 transcript 文件。"
        NSDownloadsFolderUsageDescription: "Claude Glance 需要访问下载目录以监控 Claude Code 的 transcript 文件。"
    settings:
      base:
        PRODUCT_NAME: ClaudeGlance
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.app
        INFOPLIST_FILE: ClaudeDash/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    dependencies:
      - target: ClaudeDashHelper
        embed: true
        codeSign: true
        copyPhase:
          destination: executables
      - package: Lottie

  ClaudeDashHelper:
    type: tool
    platform: macOS
    sources:
      - path: Shared
      - path: ClaudeDashHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.helper

  ClaudeDashTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeDashTests
    dependencies:
      - target: ClaudeDash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.tests
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/ClaudeGlance.app/Contents/MacOS/ClaudeGlance"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClaudeGlance.app/Contents/MacOS/ClaudeGlance"
