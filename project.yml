name: ClaudeDash

options:
  bundleIdPrefix: com.claudedash
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:

  ClaudeDash:
    type: application
    platform: macOS
    sources:
      - path: ClaudeDash/Sources
    info:
      path: ClaudeDash/Resources/Info.plist
      properties:
        CFBundleName: ClaudeDash
        CFBundleDisplayName: ClaudeDash
        CFBundleIdentifier: com.claudedash.app
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSUserNotificationAlertStyle: alert
        NSDesktopFolderUsageDescription: "ClaudeDash 需要访问桌面文件以监控 Claude Code 的 transcript 文件。"
        NSDocumentsFolderUsageDescription: "ClaudeDash 需要访问文档以监控 Claude Code 的 transcript 文件。"
        NSDownloadsFolderUsageDescription: "ClaudeDash 需要访问下载目录以监控 Claude Code 的 transcript 文件。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.app
        INFOPLIST_FILE: ClaudeDash/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    dependencies:
      - target: ClaudeDashHelper
        embed: true
        codeSign: true
        copyPhase:
          destination: executables

  ClaudeDashHelper:
    type: tool
    platform: macOS
    sources:
      - path: ClaudeDashHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.helper

  ClaudeDashTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeDashTests
    dependencies:
      - target: ClaudeDash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.claudedash.tests
